# Caller for aidoc-flow-ci's reusable markdown-lint workflow (@ci/v1.9.5).
# BLOCKING (fail-on-findings: true) as of PLAN-007 W3 — graduated from
# report-only after adopting the relaxed canon .markdownlint.json (disables
# MD013/MD024/MD036) + a targeted residual cleanup pass. Arming it as a
# required status check is the separate founder-executed W4 step
# (tracked: aidoc-flow-ci plans/FRAMEWORK-TODO.md FT-11).
name: markdown-lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/markdown-lint.yml@ci/v1.9.5
    secrets: inherit  # pragma: allowlist secret
    with:
      fail-on-findings: true   # graduated to blocking (PLAN-007 W3)
      globs: |
        **/*.md
        !node_modules
        !vendor
        !examples
