name: conformance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Conformance suite (schemas + canonicalization vectors)
        run: PYTHONPATH=. python -m unittest discover -s tests/contract -v
      - name: Lint
        run: ruff check iplan_canonical tests
