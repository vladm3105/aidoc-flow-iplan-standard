# IPLAN-0026 Phase 2 (ci/v1.3.0): dropped `pull_request_target` trigger
# from the recommended install-template set. Phase 1 (ci/v1.2.0) shipped
# the `workflow_run` mechanism alongside `pull_request_target` for safety
# during the transition. Phase 2 drops `pull_request_target` and delivers
# the actual friction relief. See composition-private.yml for the full
# rationale. Public-repo variant uses `ubuntu-latest`.
#
# The fully-superseded Phase-1 trigger set (KEPT here as commit history for
# reference) was:
#   pull_request_target:
#     types: [opened, synchronize, reopened, labeled, unlabeled]
# Existing public consumers can still locally override and re-add it if
# their flow depends on it; the Phase-2 install template no longer
# inherits it.
name: composition
on:
  pull_request_review:
    types: [submitted, dismissed, edited]
  workflow_run:
    # Fires AFTER consumer's `ai-review` caller completes (any conclusion).
    # See composition-private.yml for full rationale.
    workflows: ["ai-review"]
    types: [completed]
jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/composition.yml@ci/v1.9.5
    with:
      runner_labels: '"ubuntu-latest"'
    secrets: inherit  # pragma: allowlist secret
