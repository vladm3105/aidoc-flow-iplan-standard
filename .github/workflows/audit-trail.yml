# audit-trail — consumer caller of aidoc-flow-ci's audit-trail-check.yml
# reusable per PLAN-002 §5.5 Wave 1 (governance tier).
#
# Check-name renders as `call / verify` (matches aidoc-flow-ci naming
# convention). Post-merge, `call / verify` is added to branch-protection
# `contexts` on main via a founder-run `apply-standards.sh --apply
# --tier governance` (F5 blast-radius) per REPO_STANDARDS.md §14.3.

name: audit-trail

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  call:
    uses: vladm3105/aidoc-flow-ci/.github/workflows/audit-trail-check.yml@ci/v1.6.0
    with:
      runner_labels: '"ubuntu-latest"'
    permissions:
      contents: read
      pull-requests: read
