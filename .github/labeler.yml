docs:
  - changed-files:
      - any-glob-to-any-file: ["docs/**", "README.md", "CHANGELOG.md"]
workflows:
  - changed-files:
      - any-glob-to-any-file: [".github/workflows/**"]
scripts:
  - changed-files:
      - any-glob-to-any-file: ["scripts/**"]
tests:
  - changed-files:
      - any-glob-to-any-file: ["tests/**", "**/test_*.py", "**/*_test.py"]
security:
  - changed-files:
      - any-glob-to-any-file: [".github/workflows/security.yml", ".github/workflows/secret-scan.yml", "**/SECURITY.md"]
