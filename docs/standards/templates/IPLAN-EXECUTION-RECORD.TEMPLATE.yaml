# IPLAN-EXECUTION-RECORD.TEMPLATE.yaml
# Iplanic-owned runtime record. This is execution state, not canonical plan text.

metadata:
  schema_version: "1.3-draft"
  document_type: "iplan-execution-record"
  run_id: "RUN-NN"
  org_id: "[org-id]"
  project_id: "[project-id]"
  created_at: "2026-01-01T00:00:00Z"
  updated_at: "2026-01-01T00:00:00Z"
  status: "Queued" # Queued | Running | Blocked | Completed | Failed | Cancelled | Abandoned

plan_ref:
  iplan_id: "IPLAN-01"
  plan_version_id: "[plan-version-id]"
  chain_id: null
  imported_artifact_ref: "[artifact-ref]"

tasks:
  - task_id: "TASK-NN"
    step_id: "STEP-001"
    work_order_id: "WORK-001"
    status: "Queued"
    executor_id: null
    lease_id: null
    attempts: []

executor_assignments:
  - assignment_id: "ASSIGN-NN"
    task_id: "TASK-NN"
    executor_id: "exec:hermes2zqf7kx3a4b5c6d"
    capability_match:
      - "code_edit"
    granted_scopes: []
    assigned_at: "2026-01-01T00:00:00Z"

events:
  accepted:
    - event_id: "EVENT-NN"
      event_type: "task.started"
      task_id: "TASK-NN"
      executor_id: "exec:hermes2zqf7kx3a4b5c6d"
      status: "running"
      occurred_at: "2026-01-01T00:00:00Z"
  rejected: []

artifacts:
  accepted: []
  rejected: []

policy_decisions:
  - decision_id: "POLICY-NN"
    subject: "[user-or-executor]"
    action: "[action]"
    resource: "[resource]"
    result: "allow" # allow | deny | warning
    decided_at: "2026-01-01T00:00:00Z"

state_transitions:
  - from: "Queued"
    to: "Running"
    reason: "[Reason]"
    at: "2026-01-01T00:00:00Z"

verification:
  commands_run: []
  evidence_status: "pending"
  completion_gate: "pending"
  required_evidence:
    - evidence_id: "EVID-NN"
      status: "missing"
      required_for_completion: true
